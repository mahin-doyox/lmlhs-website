<html lang="bn">
<head>

  <title>লাহিড়ী বহুমুখী উচ্চ বিদ্যালয় • LMLHS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Noto Sans Bengali', sans-serif; background:#fbfdff; color:#0b1e33; line-height:1.6; }
    :root {
      --navy:#0b1e33; --navy-light:#1a2f4e; --pink:#e84393; --pink-light:#fd79a8; --pink-soft:#ffe4f0;
      --gray-bg:#f8fafc; --white:#fff; --shadow-sm:0 10px 25px -5px rgba(0,0,0,0.05),0 8px 10px -6px rgba(0,0,0,0.02);
      --shadow-md:0 20px 30px -10px rgba(0,0,0,0.08),0 10px 15px -8px rgba(0,0,0,0.05);
      --shadow-lg:0 30px 40px -15px rgba(0,0,0,0.12); --border-light:1px solid rgba(0,0,0,0.04);
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
    h1,h2,h3,h4 { font-weight:700; line-height:1.3; }
    .section-title { font-size:clamp(2rem,6vw,2.8rem); font-weight:800; color:var(--navy); text-align:center; margin-bottom:2.5rem; position:relative; padding-bottom:1.2rem; }
    .section-title::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:90px; height:4px; background:linear-gradient(90deg,var(--pink),var(--pink-light)); border-radius:4px; }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; padding:14px 32px; border-radius:60px; font-size:1rem; cursor:pointer; transition:0.25s; border:none; text-decoration:none; white-space:nowrap; box-shadow:var(--shadow-sm); min-height:52px; }
    .btn-primary { background:var(--pink); color:white; } .btn-primary:hover { background:#d63384; transform:translateY(-2px); }
    .btn-outline { background:transparent; border:2px solid var(--navy); color:var(--navy); } .btn-outline:hover { background:var(--navy); color:white; }
    .btn-sm { padding:10px 20px; font-size:0.9rem; min-height:44px; }
    .container { max-width:1300px; margin:0 auto; padding:0 5%; }
    /* ... (rest of CSS exactly same as provided) ... */
    .warning-banner { background:#fff3cd; color:#856404; border:1px solid #ffeeba; border-radius:12px; padding:12px 20px; margin:12px 5% 0; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; box-shadow:var(--shadow-sm); animation:pulseWarning 3s infinite; }
    .warning-banner i { color:#e6a700; margin-right:8px; }
    .popup-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); z-index:2000; display:flex; align-items:center; justify-content:center; }
    .popup-card { background:white; max-width:500px; width:90%; padding:2rem; border-radius:36px; box-shadow:var(--shadow-lg); animation:popIn 0.4s; }
    .popup-card h2 { color:var(--navy); margin-bottom:1rem; }
    .filter-tabs { display:flex; gap:0.8rem; flex-wrap:wrap; margin-bottom:2rem; }
    .filter-tab { background:#f1f5f9; border:none; padding:0.6rem 1.4rem; border-radius:30px; font-weight:600; cursor:pointer; }
    .filter-tab.active { background:var(--pink); color:white; }
    .detail-box { background:#f8fafc; padding:1rem; border-radius:16px; margin-top:1rem; border:1px solid #e2e8f0; white-space:pre-wrap; word-break:break-word; }
    .page { display:none; animation:fadeUp 0.4s; }
    .page.active { display:block; }
    @media(max-width:768px) { .nav-links { display:none; } .menu-toggle { display:block; } .nav-links.active { display:flex; } }
  </style>
</head>

<script>
  (function() {
    const SUPABASE_URL = 'https://jpnwdfdpbwgoqpwmvgkl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwbndkZmRwYndnb3Fwd212Z2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTU2NDMsImV4cCI6MjA5MjM3MTY0M30.Hn_a1czvgM2httKGUWux0NT4yqiBfvnSOEvK5NJ0gvk';
    const EMAILJS_PUBLIC_KEY = 'eY3d-EgKy8WSlW0LN';
    const EMAILJS_SERVICE_ID = 'service_z2zwlm2';
    const EMAILJS_TEMPLATE_ID = 'template_3asxotb';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    emailjs.init(EMAILJS_PUBLIC_KEY);

    let currentUser = null, currentProfile = null;
    let currentMagCat = 'all', currentEtaType = 'speech';

    // Navigation
    function navigateTo(pageId) { ... }

    // Auth UI (same)
    function updateAuthUI() { ... }
    function renderUploadForms() {
      // Magazine form includes category dropdown
      // ETA form includes extra field toggle
    }
    
    // Auth form submission (register with email, login)
    // ...

    // Gallery (upload & load)
    async function uploadGallery() { ... }
    async function loadGallery() { ... }

    // Magazine
    async function loadMagazine() {
      const query = supabase.from('magazine').select('*').eq('approved', true).order('created_at', {ascending:false});
      if (currentMagCat !== 'all') query.eq('category', currentMagCat);
      const { data } = await query;
      document.getElementById('magazineGrid').innerHTML = data?.map(m=>`
        <div class="feature-card">
          <h4>${m.title}</h4>
          <small>${m.category} — ${m.user_name}</small>
          <div class="detail-box mt-3">${m.content.replace(/\n/g, '<br>')}</div>
        </div>
      `).join('') || '<p>কোনো লেখা নেই</p>';
    }
    async function uploadMagazine() {
      const title = document.getElementById('magTitle').value;
      const category = document.getElementById('magCategory').value;
      const content = document.getElementById('magContent').value;
      if(!title||!content) return alert('শিরোনাম ও লেখা দিন');
      await supabase.from('magazine').insert([{ title, category, content, user_id: currentUser.id, user_name: currentProfile.name, approved: false }]);
      alert('জমা হয়েছে');
      loadMagazine();
    }
    // Filter clicks
    document.getElementById('magFilterTabs').addEventListener('click', e => { ... });

    // ETA
    async function loadEtaList() {
      const { data } = await supabase.from('eta').select('*').eq('approved', true).eq('type', currentEtaType).order('created_at', {ascending:false});
      const container = document.getElementById('etaList');
      if (!data?.length) { container.innerHTML='<p>কোনো কন্টেন্ট নেই</p>'; return; }
      if (currentEtaType === 'qa') {
        container.innerHTML = data.map(e=>`<div class="pending-item"><div><strong>প্রশ্নোত্তর</strong> by ${e.user_name}</div><button class="btn btn-outline btn-sm" onclick="viewEtaDetail(${e.id})">দেখুন</button></div>`).join('');
      } else {
        const groups = {};
        data.forEach(e=>{
          const key = e.extra_field || 'অন্যান্য';
          if (!groups[key]) groups[key] = [];
          groups[key].push(e);
        });
        container.innerHTML = Object.entries(groups).map(([topic, items])=>`<div class="feature-card mb-3" onclick="toggleTopicDetail('${topic}')"><h4>${topic}</h4><p>${items.length} টি এন্ট্রি</p><div id="topic-${topic.replace(/\s/g,'')}" class="detail-box mt-3" style="display:none;"></div></div>`).join('');
      }
    }
    window.toggleTopicDetail = async function(topic) { ... }
    window.viewEtaDetail = async function(id) { ... }
    async function uploadEta() {
      const type = document.getElementById('etaType').value;
      const extraField = document.getElementById('etaExtraInput')?.value || null;
      const content = document.getElementById('etaContent').value;
      if(!content) return alert('কন্টেন্ট লিখুন');
      if ((type==='speech'||type==='science') && !extraField) return alert('উপলক্ষ/টপিক লিখুন');
      await supabase.from('eta').insert([{ type, extra_field: extraField, content, user_id: currentUser.id, user_name: currentProfile.name, approved: false }]);
      alert('জমা হয়েছে');
      loadEtaList();
    }
    document.getElementById('etaTypeTabs').addEventListener('click', e => { ... });

    // Profile (limit 2 notifications)
    async function loadProfile() {
      if(!currentUser) return navigateTo('home');
      document.getElementById('profileInfo').innerHTML = `<p><strong>নাম:</strong> ${currentProfile.name}</p><p><strong>ইমেইল:</strong> ${currentUser.email}</p><p><strong>ফোন:</strong> ${currentProfile.phone||'N/A'}</p><p><strong>রোল:</strong> ${currentProfile.role}</p>`;
      const { data: notifs } = await supabase.from('notifications').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false}).limit(2);
      document.getElementById('notifList').innerHTML = notifs?.map(n=>`<p>🔔 ${n.message} <small>${new Date(n.created_at).toLocaleString()}</small></p>`).join('') || '<p>কোনো নোটিফিকেশন নেই</p>';
    }

    // Admin panel
    let activeAdminTab = 'gallery';
    async function loadAdminPanel() {
      if(!currentProfile||currentProfile.role!=='admin') return navigateTo('home');
      const container = document.getElementById('adminContent');
      if(activeAdminTab==='gallery') {
        const { data } = await supabase.from('gallery').select('*').eq('approved', false);
        container.innerHTML = data?.map(i=>`<div class="pending-item"><div><img src="${i.image_url}" width="50"> ${i.caption} (${i.user_name})</div><button class="btn btn-primary btn-sm" onclick="approveItem('gallery',${i.id})">অনুমোদন</button></div>`).join('')||'<p>কোনো পেন্ডিং নেই</p>';
      } else if(activeAdminTab==='magazine') {
        const { data } = await supabase.from('magazine').select('*').eq('approved', false);
        container.innerHTML = data?.map(m=>`<div class="pending-item" id="mag-${m.id}"><div style="width:100%;"><div style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${m.title}</strong> (${m.category}) by ${m.user_name}</div><div><button class="btn btn-outline btn-sm" onclick="toggleDetail('mag-${m.id}-detail')">বিস্তারিত</button><button class="btn btn-primary btn-sm" onclick="approveItem('magazine',${m.id})">অনুমোদন</button></div></div><div id="mag-${m.id}-detail" class="detail-box" style="display:none;">${m.content.replace(/\n/g, '<br>')}</div></div></div>`).join('')||'<p>কোনো পেন্ডিং নেই</p>';
      } else if(activeAdminTab==='eta') {
        const { data } = await supabase.from('eta').select('*').eq('approved', false);
        container.innerHTML = data?.map(e=>`<div class="pending-item" id="eta-${e.id}"><div style="width:100%;"><div style="display:flex; justify-content:space-between; align-items:center;"><div><strong>${e.type}</strong> (${e.extra_field||'--'}) by ${e.user_name} — ${e.content.substring(0,50)}...</div><div><button class="btn btn-outline btn-sm" onclick="toggleDetail('eta-${e.id}-detail')">বিস্তারিত</button><button class="btn btn-primary btn-sm" onclick="approveItem('eta',${e.id})">অনুমোদন</button></div></div><div id="eta-${e.id}-detail" class="detail-box" style="display:none;">${e.content.replace(/\n/g, '<br>')}</div></div></div>`).join('')||'<p>কোনো পেন্ডিং নেই</p>';
      } else if(activeAdminTab==='notification') {
        container.innerHTML = `<div class="form-card"><h3>🔔 সকলকে নোটিফিকেশন পাঠান</h3><textarea id="notifMsg" class="form-control" placeholder="মেসেজ লিখুন"></textarea><button class="btn btn-primary w-100 mt-3" onclick="sendAdminNotification()">পাঠান</button></div>`;
      } else if(activeAdminTab==='email') {
        container.innerHTML = `<div class="form-card"><h3>📧 সকলকে ইমেইল পাঠান</h3><textarea id="emailMsg" class="form-control" placeholder="মেসেজ লিখুন"></textarea><button class="btn btn-primary w-100 mt-3" onclick="sendEmailToAll()">ইমেইল পাঠান</button></div>`;
      } else if(activeAdminTab==='announcement') {
        container.innerHTML = `<div class="form-card"><h3>📢 পপ-আপ ঘোষণা তৈরি</h3><textarea id="announceMsg" class="form-control" placeholder="ঘোষণার মেসেজ"></textarea><button class="btn btn-primary w-100 mt-3" onclick="createAnnouncement()">পোস্ট করুন</button></div>`;
      }
    }

    window.toggleDetail = (id) => { ... }
    window.approveItem = async (table, id) => {
      await supabase.from(table).update({ approved: true }).eq('id', id);
      const { data: item } = await supabase.from(table).select('user_id').eq('id', id).single();
      if(item) await supabase.from('notifications').insert([{ user_id: item.user_id, message: `আপনার ${table} কন্টেন্ট অনুমোদিত হয়েছে।` }]);
      loadAdminPanel();
    }
    window.sendAdminNotification = async () => {
      const msg = document.getElementById('notifMsg').value;
      if(!msg) return alert('মেসেজ লিখুন');
      const { data: users } = await supabase.from('profiles').select('id');
      for(let u of users) await supabase.from('notifications').insert([{ user_id: u.id, message: `🔔 অ্যাডমিন: ${msg}` }]);
      alert('সকলকে নোটিফিকেশন পাঠানো হয়েছে');
    }
    window.sendEmailToAll = async () => {
      const msg = document.getElementById('emailMsg').value;
      if(!msg) return alert('মেসেজ লিখুন');
      const { data: users } = await supabase.from('profiles').select('email, name, id').not('email', 'is', null);
      let success = 0, fail = 0;
      for(let u of users) {
        try {
          await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { to_email: u.email, to_name: u.name||'শিক্ষার্থী', message: msg });
          success++;
          await supabase.from('notifications').insert([{ user_id: u.id, message: `📧 ইমেইল পাঠানো হয়েছে: ${msg}` }]);
        } catch(e) { fail++; console.error(e); }
      }
      alert(`📧 ইমেইল রিপোর্ট: ✅ ${success} ❌ ${fail}`);
    }
    window.createAnnouncement = async function() {
      const msg = document.getElementById('announceMsg').value;
      if(!msg) return alert('মেসেজ লিখুন');
      await supabase.from('announcements').delete().neq('id', 0);
      await supabase.from('announcements').insert([{ message: msg }]);
      alert('ঘোষণা সেট করা হয়েছে!');
    }
    
    async function checkAnnouncement() {
      const { data } = await supabase.from('announcements').select('*').order('created_at', {ascending:false}).limit(1);
      if (data?.length) {
        document.getElementById('announceText').innerText = data[0].message;
        document.getElementById('announcePopup').style.display = 'flex';
      }
    }
    window.closeAnnouncement = () => { document.getElementById('announcePopup').style.display = 'none'; }

    // Init
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session) {
        currentUser = session.user;
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
        currentProfile = profile || { role:'student' };
      } else {
        currentUser = currentProfile = null;
      }
      updateAuthUI();
      const hash = window.location.hash.substring(1) || 'home';
      navigateTo(hash);
    });

    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        currentUser = session.user;
        supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(({ data }) => {
          currentProfile = data || { role:'student' };
          updateAuthUI();
          navigateTo(window.location.hash.substring(1) || 'home');
        });
      } else {
        updateAuthUI();
        navigateTo('home');
      }
      checkAnnouncement();
    });

  })();
</script>
</body>
